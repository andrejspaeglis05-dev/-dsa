<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Fixed Slither Bots</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #00ffcc;
            pointer-events: none; text-shadow: 2px 2px 5px black;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h2 style="margin:0">Счёт: <span id="score">0</span></h2>
        <p>Боты: <span id="botCount">0</span> | Зажми ЛКМ для рывка!</p>
    </div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const botCountEl = document.getElementById('botCount');

const WORLD_SIZE = 3000;
let score = 0;
let isBoosting = false;

const mouse = { x: 0, y: 0 };
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('mousedown', () => isBoosting = true);
window.addEventListener('mouseup', () => isBoosting = false);

class Snake {
    constructor(x, y, color, isBot = false) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.isBot = isBot;
        this.radius = 12;
        this.segments = [];
        this.length = 40;
        this.angle = Math.random() * Math.PI * 2;
        this.speed = 3;
        this.isDead = false;
        
        // Для ботов
        this.turnSpeed = 0.05;
        this.targetAngle = this.angle;
    }

    update(target) {
        if (this.isDead) return;

        if (this.isBot) {
            const distToPlayer = Math.hypot(target.x - this.x, target.y - this.y);
            
            // Если игрок рядом — бот атакует (летит на него)
            if (distToPlayer < 500) {
                this.targetAngle = Math.atan2(target.y - this.y, target.x - this.x);
                this.speed = 4.5;
            } else {
                // Просто ползает
                if (Math.random() < 0.02) this.targetAngle += (Math.random() - 0.5) * 2;
                this.speed = 3;
            }
            // Плавный поворот
            let diff = this.targetAngle - this.angle;
            while (diff < -Math.PI) diff += Math.PI * 2;
            while (diff > Math.PI) diff -= Math.PI * 2;
            this.angle += diff * this.turnSpeed;

        } else {
            // Игрок
            const dx = mouse.x - (canvas.width / 2);
            const dy = mouse.y - (canvas.height / 2);
            this.angle = Math.atan2(dy, dx);
            
            if (isBoosting && this.length > 15) {
                this.speed = 6.5;
                this.length -= 0.1;
                score = Math.max(0, score - 0.05);
            } else {
                this.speed = 3.5;
            }
        }

        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;

        // Смерть об границы
        if (this.x < 0 || this.x > WORLD_SIZE || this.y < 0 || this.y > WORLD_SIZE) {
            this.die();
        }

        this.segments.unshift({ x: this.x, y: this.y });
        if (this.segments.length > this.length) this.segments.pop();
    }

    die() {
        this.isDead = true;
        // Тело в еду
        for (let i = 0; i < this.segments.length; i += 3) {
            foods.push(new Food(this.segments[i].x, this.segments[i].y, this.color));
        }

        if (!this.isBot) {
            setTimeout(() => { alert("Игра окончена! Счёт: " + Math.floor(score)); location.reload(); }, 100);
        } else {
            // Респаун бота в случайном месте
            setTimeout(() => {
                this.isDead = false;
                this.x = Math.random() * WORLD_SIZE;
                this.y = Math.random() * WORLD_SIZE;
                this.length = 40;
                this.segments = [];
            }, 2000);
        }
    }

    draw(camX, camY) {
        if (this.isDead || this.segments.length < 2) return;
        
        ctx.beginPath();
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = this.color;
        ctx.lineWidth = this.radius * 2;

        const startX = this.segments[0].x - camX + canvas.width / 2;
        const startY = this.segments[0].y - camY + canvas.height / 2;
        ctx.moveTo(startX, startY);

        for (let i = 1; i < this.segments.length; i++) {
            const sx = this.segments[i].x - camX + canvas.width / 2;
            const sy = this.segments[i].y - camY + canvas.height / 2;
            ctx.lineTo(sx, sy);
        }
        ctx.stroke();

        // Глаза
        ctx.fillStyle = 'white';
        const ex = startX + Math.cos(this.angle) * 8;
        const ey = startY + Math.sin(this.angle) * 8;
        ctx.beginPath();
        ctx.arc(ex, ey, 5, 0, Math.PI * 2);
        ctx.fill();
    }
}

class Food {
    constructor(x, y, color) {
        this.x = x || Math.random() * WORLD_SIZE;
        this.y = y || Math.random() * WORLD_SIZE;
        this.color = color || `hsl(${Math.random() * 360}, 100%, 50%)`;
        this.radius = 5;
    }
    draw(camX, camY) {
        const sx = this.x - camX + canvas.width / 2;
        const sy = this.y - camY + canvas.height / 2;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(sx, sy, this.radius, 0, Math.PI * 2);
        ctx.fill();
    }
}

// Инициализация
const player = new Snake(WORLD_SIZE/2, WORLD_SIZE/2, '#00ffcc');
const bots = [];
for(let i=0; i<15; i++) {
    bots.push(new Snake(Math.random()*WORLD_SIZE, Math.random()*WORLD_SIZE, '#ff3300', true));
}
let foods = Array.from({ length: 200 }, () => new Food());

function checkCollisions() {
    const all = [player, ...bots];
    all.forEach(s1 => {
        if (s1.isDead) return;
        all.forEach(s2 => {
            if (s2.isDead || s1 === s2) return;
            // Проверка: голова s1 в тело s2
            for (let i = 10; i < s2.segments.length; i++) {
                const dist = Math.hypot(s1.x - s2.segments[i].x, s1.y - s2.segments[i].y);
                if (dist < s1.radius + 5) s1.die();
            }
        });
    });
}

function animate() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const camX = player.x;
    const camY = player.y;

    ctx.fillStyle = '#050505';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Сетка
    ctx.strokeStyle = '#151515';
    for(let i=0; i<=WORLD_SIZE; i+=100) {
        ctx.beginPath();
        ctx.moveTo(i - camX + canvas.width/2, -camY + canvas.height/2);
        ctx.lineTo(i - camX + canvas.width/2, WORLD_SIZE - camY + canvas.height/2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(-camX + canvas.width/2, i - camY + canvas.height/2);
        ctx.lineTo(WORLD_SIZE - camX + canvas.width/2, i - camY + canvas.height/2);
        ctx.stroke();
    }

    // Граница
    ctx.strokeStyle = '#ff0044';
    ctx.lineWidth = 10;
    ctx.strokeRect(-camX + canvas.width/2, -camY + canvas.height/2, WORLD_SIZE, WORLD_SIZE);

    // Еда
    foods.forEach((f, index) => {
        f.draw(camX, camY);
        const d = Math.hypot(player.x - f.x, player.y - f.y);
        if (d < player.radius + 10) {
            foods.splice(index, 1);
            player.length += 2;
            score += 10;
            scoreEl.innerText = Math.floor(score);
            foods.push(new Food());
        }
    });

    checkCollisions();

    // Боты
    let activeBots = 0;
    bots.forEach(bot => {
        if(!bot.isDead) activeBots++;
        bot.update(player);
        bot.draw(camX, camY);
    });
    botCountEl.innerText = activeBots;

    player.update();
    player.draw(camX, camY);

    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
