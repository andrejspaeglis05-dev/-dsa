<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Mini Slither.io</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1 style="margin:0">Slither Clone</h1>
        <p>Счёт: <span id="score">0</span></p>
        <small>Управление: Движение мышью</small>
    </div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

// Настройки
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
const mouse = { x: canvas.width / 2, y: canvas.height / 2 };

// Сущность Змейка
class Snake {
    constructor() {
        this.x = canvas.width / 2;
        this.y = canvas.height / 2;
        this.radius = 12;
        this.segments = [];
        this.length = 20;
        this.speed = 3;
        this.angle = 0;
        this.color = '#00ffcc';
    }

    update() {
        // Вычисляем угол к мыши
        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;
        this.angle = Math.atan2(dy, dx);

        // Движение головы
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;

        // Добавляем текущую позицию в начало массива сегментов
        this.segments.unshift({ x: this.x, y: this.y });

        // Ограничиваем длину
        if (this.segments.length > this.length) {
            this.segments.pop();
        }
    }

    draw() {
        // Рисуем хвост
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = this.color;
        ctx.lineWidth = this.radius * 2;
        
        ctx.beginPath();
        ctx.moveTo(this.segments[0].x, this.segments[0].y);
        for (let i = 1; i < this.segments.length; i++) {
            ctx.lineTo(this.segments[i].x, this.segments[i].y);
        }
        ctx.stroke();

        // Рисуем глаза
        ctx.fillStyle = 'white';
        const eyeX = this.x + Math.cos(this.angle) * 5;
        const eyeY = this.y + Math.sin(this.angle) * 5;
        ctx.beginPath();
        ctx.arc(eyeX, eyeY, 4, 0, Math.PI * 2);
        ctx.fill();
    }
}

// Еда
class Food {
    constructor() {
        this.reset();
    }

    reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.radius = 5;
        this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
    }

    draw() {
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

const player = new Snake();
const foods = Array.from({ length: 30 }, () => new Food());

// Обработка мыши
window.addEventListener('mousemove', (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

function animate() {
    // Очистка экрана
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Сетка на фоне
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1;
    for(let i=0; i<canvas.width; i+=50) {
        ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i, canvas.height); ctx.stroke();
    }
    for(let i=0; i<canvas.height; i+=50) {
        ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width, i); ctx.stroke();
    }

    // Обновление и отрисовка еды
    foods.forEach(food => {
        food.draw();
        
        // Проверка столкновения с едой
        const dist = Math.hypot(player.x - food.x, player.y - food.y);
        if (dist < player.radius + food.radius) {
            food.reset();
            player.length += 2;
            score += 10;
            scoreEl.innerText = score;
        }
    });

    player.update();
    player.draw();

    requestAnimationFrame(animate);
}

// Адаптация размера окна
window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

animate();
</script>
</body>
</html>
