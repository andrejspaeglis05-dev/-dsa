<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Aggressive Slither Bots</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            pointer-events: none; text-shadow: 2px 2px 5px black;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h2 style="margin:0">Счёт: <span id="score">0</span></h2>
        <p>ЛКМ — Ускорение | Остерегайся красных ботов!</p>
    </div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

const WORLD_SIZE = 2500;
let score = 0;
let isBoosting = false;

const mouse = { x: 0, y: 0 };
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('mousedown', () => isBoosting = true);
window.addEventListener('mouseup', () => isBoosting = false);

class Snake {
    constructor(x, y, color, isBot = false) {
        this.x = x; this.y = y;
        this.color = color;
        this.isBot = isBot;
        this.radius = 12;
        this.segments = [];
        this.length = 40;
        this.angle = Math.random() * Math.PI * 2;
        this.speed = 3;
        this.isDead = false;
    }

    update(targetPlayer) {
        if (this.isDead) return;

        if (this.isBot) {
            const distToPlayer = Math.hypot(targetPlayer.x - this.x, targetPlayer.y - this.y);
            
            // Агрессивное поведение: если игрок близко, бот летит на перехват
            if (distToPlayer < 400) {
                const targetAngle = Math.atan2(targetPlayer.y - this.y, targetPlayer.x - this.x);
                this.angle += (targetAngle - this.angle) * 0.1;
                this.speed = 5; // Ускоряется при атаке
            } else {
                if (Math.random() < 0.02) this.angle += (Math.random() - 0.5) * 2;
                this.speed = 3;
            }
        } else {
            const dx = mouse.x - (canvas.width / 2);
            const dy = mouse.y - (canvas.height / 2);
            this.angle = Math.atan2(dy, dx);
            
            if (isBoosting && this.length > 15) {
                this.speed = 7;
                this.length -= 0.15;
                score = Math.max(0, score - 0.1);
            } else {
                this.speed = 3;
            }
        }

        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;

        // Смерть об границы мира
        if (this.x < 0 || this.x > WORLD_SIZE || this.y < 0 || this.y > WORLD_SIZE) {
            this.die();
        }

        this.segments.unshift({ x: this.x, y: this.y });
        if (this.segments.length > this.length) this.segments.pop();
    }

    die() {
        this.isDead = true;
        // Превращаем тело в еду
        this.segments.forEach(s => {
            if (Math.random() > 0.5) foods.push(new Food(s.x, s.y, this.color));
        });

        if (!this.isBot) {
            setTimeout(() => {
                alert("Game Over! Твой счёт: " + Math.floor(score));
                location.reload();
            }, 100);
        } else {
            // Респаун бота через 3 секунды
            setTimeout(() => {
                this.isDead = false;
                this.x = Math.random() * WORLD_SIZE;
                this.y = Math.random() * WORLD_SIZE;
                this.length = 40;
                this.segments = [];
            }, 3000);
        }
    }

    draw(camX, camY) {
        if (this.isDead) return;
        ctx.lineCap = 'round';
        ctx.strokeStyle = this.color;
        ctx.lineWidth = this.radius * 2;
        ctx.beginPath();
        this.segments.forEach((seg, i) => {
            const sx = seg.x - camX + canvas.width / 2;
            const sy = seg.y - camY + canvas.height / 2;
            if (i === 0) ctx.moveTo(sx, sy);
            else ctx.lineTo(sx, sy);
        });
        ctx.stroke();
        
        // Глаза (чтобы понимать где перед)
        const headX = this.segments[0].x - camX + canvas.width/2;
        const headY = this.segments[0].y - camY + canvas.height/2;
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(headX + Math.cos(this.angle)*8, headY + Math.sin(this.angle)*8, 5, 0, Math.PI*2);
        ctx.fill();
    }
}

class Food {
    constructor(x, y, color) {
        this.x = x || Math.random() * WORLD_SIZE;
        this.y = y || Math.random() * WORLD_SIZE;
        this.color = color || `hsl(${Math.random() * 360}, 100%, 50%)`;
        this.radius = 6;
    }
    draw(camX, camY) {
        const sx = this.x - camX + canvas.width / 2;
        const sy = this.y - camY + canvas.height / 2;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(sx, sy, this.radius, 0, Math.PI * 2);
        ctx.fill();
    }
}

const player = new Snake(WORLD_SIZE/2, WORLD_SIZE/2, '#00ffcc');
let bots = Array.from({ length: 8 }, () => new Snake(Math.random()*WORLD_SIZE, Math.random()*WORLD_SIZE, '#ff4444', true));
let foods = Array.from({ length: 150 }, () => new Food());

function checkCollisions() {
    const allSnakes = [player, ...bots];
    
    allSnakes.forEach(snake => {
        if (snake.isDead) return;
        
        allSnakes.forEach(other => {
            if (other.isDead || snake === other) return;
            
            // Проверяем, врезалась ли голова змеи в тело другой змеи
            other.segments.forEach((seg, index) => {
                if (index < 5) return; // Не умирать об свою голову
                const dist = Math.hypot(snake.x - seg.x, snake.y - seg.y);
                if (dist < snake.radius + 5) {
                    snake.die();
                }
            });
        });
    });
}

function animate() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const camX = player.x; const camY = player.y;

    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Сетка
    ctx.strokeStyle = '#1a1a1a';
    for(let i=0; i<=WORLD_SIZE; i+=100) {
        ctx.beginPath();
        ctx.moveTo(i - camX + canvas.width/2, 0 - camY + canvas.height/2);
        ctx.lineTo(i - camX + canvas.width/2, WORLD_SIZE - camY + canvas.height/2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0 - camX + canvas.width/2, i - camY + canvas.height/2);
        ctx.lineTo(WORLD_SIZE - camX + canvas.width/2, i - camY + canvas.height/2);
        ctx.stroke();
    }

    // Граница
    ctx.strokeStyle = '#ff0000';
    ctx.lineWidth = 10;
    ctx.strokeRect(-camX + canvas.width/2, -camY + canvas.height/2, WORLD_SIZE, WORLD_SIZE);

    foods.forEach((f, i) => {
        f.draw(camX, camY);
        if (Math.hypot(player.x - f.x, player.y - f.y) < player.radius + f.radius) {
            foods.splice(i, 1);
            player.length += 3;
            score += 15;
            scoreEl.innerText = Math.floor(score);
            foods.push(new Food());
        }
    });

    checkCollisions();

    bots.forEach(bot => {
        bot.update(player);
        bot.draw(camX, camY);
    });

    player.update();
    player.draw(camX, camY);

    requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
